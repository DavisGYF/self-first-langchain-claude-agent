services:
  web-chat:
    build:
      context: .
      args:
        USE_CN_APT: "true"
        NPM_REGISTRY: "https://registry.npmmirror.com"
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - projects-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  projects-network:
    driver: bridge
