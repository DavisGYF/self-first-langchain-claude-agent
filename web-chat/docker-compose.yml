version: "3.8"

services:
  web-chat:
    build:
      context: .
      args:
        USE_CN_APT: "true"
        NPM_REGISTRY: "https://registry.npmmirror.com"
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - projects-network

networks:
  projects-network:
    driver: bridge
